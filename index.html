<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">井字棋</h1>
        
        <div class="controls">
            <div class="mode-select">
                <label>游戏模式：</label>
                <select id="gameMode">
                    <option value="pvp">双人对战</option>
                    <option value="pve">人机对战</option>
                </select>
            </div>
            
            <div class="difficulty-select" id="difficultyContainer">
                <label>AI 难度：</label>
                <select id="aiDifficulty">
                    <option value="easy">简单</option>
                    <option value="hard">困难</option>
                </select>
            </div>
            
            <div class="theme-select">
                <label>主题：</label>
                <select id="themeSelect">
                    <option value="classic">简约灰白</option>
                    <option value="neon">霓虹紫绿</option>
                    <option value="retro">复古纸黄</option>
                </select>
            </div>
        </div>
        
        <div class="scoreboard">
            <div class="score">
                <span class="player-label" id="player1Label">玩家 X</span>
                <span class="score-value" id="player1Score">0</span>
            </div>
            <div class="score">
                <span class="player-label">平局</span>
                <span class="score-value" id="drawScore">0</span>
            </div>
            <div class="score">
                <span class="player-label" id="player2Label">玩家 O</span>
                <span class="score-value" id="player2Score">0</span>
            </div>
        </div>
        
        <div class="game-status" id="gameStatus">玩家 X 的回合</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        
        <button class="reset-btn" id="resetBtn">重新开始</button>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
